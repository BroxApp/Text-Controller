<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="myText">
<h1>Wisdom</h1>
<p>
    "The journey of a thousand miles begins with a single step."<br/>
    "Believe you can and you're halfway there."<br/><br/>
    "Happiness is not something ready made. It comes from your own actions."<br/>
    "The only way to do great work is to love what you do."
</p>
</div>

<div class="buttons">
<button onclick="changeFont('Arial')">Arial</button>
<button onclick="changeFont('Tahoma')">Tahoma</button>
<button onclick="changeFont('Courier New')">Courier</button>
<br><br>
<button onclick="changeSize('small')">Small</button>
<button onclick="changeSize('medium')">Medium</button>
<button onclick="changeSize('large')">Large</button>
<button onclick="changeSize('xLarge')">Extra Large</button>
</div>

<script src="script.js"></script>
</body>
</html>
