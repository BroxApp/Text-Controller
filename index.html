<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div  id="myText">
<h1>باران</h1>
<p>باران که شدی مپرس این خانه کیست<br/>
سقف حرم و مسجد و میخانه یکی است<br/>

باران که شدی پیاله‌ها را نشمار<br/>
جام و قدح و کاسه و پیمانه یکی است
</p>
</div>

<div class="buttons">
<button onclick="changeFont('IranNastaliq')">Nastaliq</button>
<button onclick="changeFont('Tahoma')">Tahoma</button>
<button onclick="changeFont('Vazirmatn')">Vazirmatn</button>
<br><br>
<button onclick="changeSize('small')">کوچک</button>
<button onclick="changeSize('medium')">متوسط</button>
<button onclick="changeSize('large')">بزرگ</button>
<button onclick="changeSize('xLarge')">خیلی بزرگ</button>
</div>

<script src="script.js"></script>
</body>
</html>
